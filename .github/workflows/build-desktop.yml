name: Build desktop apps

on:
  workflow_dispatch:
  push:
    branches:
      - master

permissions:
  contents: read

jobs:
  package:
    name: ${{ matrix.name }}
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 90
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: macOS ARM64
            runner: macos-14
            artifact: bold-code-macos-arm64
            path: .build/packages/VSCode-darwin-arm64/Bold Code.app
          - name: Windows x64
            runner: windows-2022
            artifact: bold-code-windows-x64
            path: .build/packages/VSCode-win32-x64

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Build and package
        shell: bash
        run: ./build.sh --package

      - name: Upload package
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.path }}
          if-no-files-found: error
          retention-days: 14
