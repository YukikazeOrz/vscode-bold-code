name: Build - macOS

on:
  workflow_dispatch: {}
  push:
    branches:
      - main
    paths-ignore:
      - "**/*.md"

env:
  APP_NAME: VSCodium
  BINARY_NAME: codium
  GH_REPO_PATH: ${{ github.repository }}
  ORG_NAME: ${{ github.repository_owner }}
  OS_NAME: osx
  VSCODE_QUALITY: stable

permissions:
  contents: read

jobs:
  build:
    runs-on: ${{ matrix.runner }}
    env:
      VSCODE_ARCH: ${{ matrix.vscode_arch }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: macos-15-intel
            vscode_arch: x64
          - runner: macos-14
            vscode_arch: arm64

    steps:
      - uses: actions/checkout@v5
        with:
          persist-credentials: false

      - name: Setup Node.js environment
        uses: actions/setup-node@v5
        with:
          node-version-file: .nvmrc

      - name: Setup Python 3
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
        if: env.VSCODE_ARCH == 'x64'

      - name: Clone VSCode repo
        run: . get_repo.sh

      - name: Build
        env:
          SHOULD_BUILD: yes
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: ./build.sh

      - name: Prepare assets
        # Signing/notarization only runs when CERTIFICATE_OSX_* secrets are configured on the
        # repo/environment; without them this still produces an unsigned .dmg + .zip (macOS
        # will show a Gatekeeper warning on first launch — right-click > Open, or
        # `xattr -dr com.apple.quarantine`). Add the certs later to get a signed build for free.
        env:
          CERTIFICATE_OSX_APP_PASSWORD: ${{ secrets.CERTIFICATE_OSX_APP_PASSWORD }}
          CERTIFICATE_OSX_APPLE_ID: ${{ secrets.CERTIFICATE_OSX_APPLE_ID }}
          CERTIFICATE_OSX_P12_DATA: ${{ secrets.CERTIFICATE_OSX_P12_DATA }}
          CERTIFICATE_OSX_P12_PASSWORD: ${{ secrets.CERTIFICATE_OSX_P12_PASSWORD }}
          CERTIFICATE_OSX_TEAM_ID: ${{ secrets.CERTIFICATE_OSX_TEAM_ID }}
        run: ./prepare_assets.sh

      - name: Upload assets
        uses: actions/upload-artifact@v4
        with:
          name: macos-${{ matrix.vscode_arch }}
          path: assets/
          retention-days: 14

      - name: Clean up keychain
        if: always()
        run: |
          KEYCHAIN=$RUNNER_TEMP/buildagent.keychain
          if [ -f "$KEYCHAIN" ]; then
            security delete-keychain "$KEYCHAIN"
          fi
